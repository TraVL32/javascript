<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Считать ворон</title>
</head>
<body>
    <label>Сколько ворон: <input type="number" id="num"></label>
    <button id="btn">Считать</button>

    <script>
        'use strict';

        let btn = document.getElementById('btn');
        btn.addEventListener('click', function() {
            let num = Number(document.getElementById('num').value);
            let lastDigit = num % 10;
            let lastTwoDigits = num % 100;
            
            let word = "";

            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "ворон";
            } else {
                switch (lastDigit) {
                    case 1:
                        word = "ворона";
                        break;
                    case 2:
                    case 3:
                    case 4:
                        word = "вороны";
                        break;
                    default:
                        word = "ворон";
                }
            }

            alert("На ветке сидит " + num + " " + word);
        });
    </script>
</body>
</html>
