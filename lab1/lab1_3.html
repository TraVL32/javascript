<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Ввод числа</title>
</head>
<body>
    <a href="index.html" id="my-link">Получить число</a>

    <script>
        'use strict';

        let link = document.getElementById('my-link');
        
        link.addEventListener('click', function(event) {
            event.preventDefault();
            let isDone = false;

            while (isDone === false) {
                let userInput = prompt("Введите число больше 100:", "");

                if (userInput === null) {
                    isDone = true;
                    
                    let allow = confirm("Перейти по ссылке?");
                    if (allow === true) {
                        window.location.href = link.href;
                    }
                } else if (Number(userInput) > 100) {
                    isDone = true;
                    window.location.href = link.href;
                }
            }
        });
    </script>
</body>
</html>
