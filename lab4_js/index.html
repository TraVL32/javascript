<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Лаба 4</title>
</head>
<body>
    <h1>Лабораторная работа 4</h1>
    <p>Открой консоль браузера</p>

    <script>
    class Book {
        #price;

        constructor(title, author, pubYear, price) {
            this.title = title;
            this.author = author;
            this._pubYear = pubYear;
            this.#price = price;
        }

        get pubYear() {
            return this._pubYear;
        }

        set pubYear(value) {
            if (value > 0) {
                this._pubYear = value;
            }
        }

        getPrice() {
            return this.#price;
        }

        setPrice(value) {
            if (value > 0) {
                this.#price = value;
            }
        }

        showInfo() {
            console.log("Название:", this.title);
            console.log("Автор:", this.author);
            console.log("Год издания:", this._pubYear);
            console.log("Цена:", this.#price);
        }
    }

    const book1 = new Book("Мастер и Маргарита", "Михаил Булгаков", 1967, 500);

    console.log("Исходные данные:");
    book1.showInfo();

    book1.pubYear = 2000;
    console.log("После изменения pubYear:");
    console.log(book1.pubYear);

    book1._pubYear = 2010;
    console.log("После прямого изменения _pubYear:");
    console.log(book1.pubYear);

    book1.price = 1000;
    console.log("После попытки изменить price напрямую:");
    console.log(book1.price);

    book1.setPrice(1200);
    console.log("После изменения price через метод:");
    console.log(book1.getPrice());

    book1.showInfo();
</script>
</body>
</html>
