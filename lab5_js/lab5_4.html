<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Меню</title>
    <style>
        .menu {
            width: 220px;
        }

        .title {
            cursor: pointer;
            user-select: none;
            font-weight: bold;
        }

        .title::before {
            content: "▶";
            display: inline-block;
            margin-right: 8px;
        }

        .title.open::before {
            content: "▼";
        }

        ul {
            margin-top: 10px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="menu">
        <div class="title">Сладости (нажми меня)!</div>
        <ul class="hidden">
            <li>Торт</li>
            <li>Пончик</li>
            <li>Пирожное</li>
        </ul>
    </div>

    <script>
        let title = document.querySelector('.title');
        let list = document.querySelector('ul');

        title.addEventListener('click', function () {
            list.classList.toggle('hidden');
            title.classList.toggle('open');
        });
    </script>
</body>
</html>
