<!DOCTYPE html>
<!-- saved from url=(0046)https://fedyaevys.ru/javascript/lab5/menu.html -->
<html lang="ru"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	
	<title>Меню</title>
	<style>
	    .menu ul {
	      margin: 0;
	      list-style: none;
	      padding-left: 20px;
	      display: none;
	    }

	    .menu .title {
	      font-size: 18px;
	      cursor: pointer;
	    }

	    .menu .title::before {
	      content: '▶';
	      font-size: 80%;
	      color: green;
	      display: inline-block;		
	      width: 18px;

	    }

	    .menu.open .title::before {
	      content: '▼';
	    }

	    .menu.open ul {
	      display: block;
	    }
	</style>
</head>
<body>
	<div class="menu open">
		<span class="title ">Сладости (нажми меня)!</span>
	 	<ul>
	    	<li>Торт</li>
	    	<li>Пончик</li>
	    	<li>Пирожное</li>
	  	</ul>
	</div>

	<script>
    let title = document.querySelector('.title');
    let list = document.querySelector('ul');

    title.style.cursor = 'pointer';
    
    title.addEventListener('click', function() {
        if (list.style.display === 'none') {
            list.style.display = 'block';
        } else {
            list.style.display = 'none';
        }
    });
</script>

</body></html>
