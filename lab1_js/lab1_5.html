<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Таблица</title>
</head>
<body>
    <p>Откройте консоль браузера (F12 -> вкладка Console), чтобы увидеть результат.</p>

    <form id="table-form">
        <label>
            Число строк:
            <input type="number" id="rows" value="5" required>
        </label>
        <button type="submit">Рисовать</button>
    </form>

    <script>
        'use strict';

        let form = document.getElementById('table-form');

        form.addEventListener('submit', function(event) {
            event.preventDefault();

            let rowsCount = Number(document.getElementById('rows').value);
            let animals = ['dog', 'dog', 'dog', 'cat', 'cat'];

            for (let row = 0; row < rowsCount; row++) {
                let rowString = '';

                for (let col = 0; col < 6; col++) {
                    let index = (row + col) % 5;
                    rowString = rowString + animals[index] + '\t';
                }

                console.log(rowString);
            }
        });
    </script>
</body>
</html>
